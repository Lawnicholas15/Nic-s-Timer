<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nic's Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <link rel="stylesheet" href="style.css"> <div class="container">
    <h1>Nic's Timer</h1>
    
    <div class="input-group">
        <input type="number" placeholder="HH" id="inputhr">
        <input type="number" placeholder="MM" id="inputmin">
        <input type="number" placeholder="SS" id="inputsec">
    </div>

    <div class="timer-display">
        <span id="hour">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span>
    </div>

    <div class="button-group">
        <button onclick="startTime()">Start</button>
        <button onclick="pauseTime()">Pause</button>
        <button onclick="resetTime()">Reset</button>
    </div>
</div>

    <script>
        let timer = null;
        const alarmsound = new Audio('loudest_alarm_clock.mp3')

        const startTime = () => {
            if (timer) clearInterval(timer);

            const format = (num) => String(num).padStart(2, '0');

            // 1. Get values from the display spans
            let currentH = parseInt(document.getElementById("hour").innerHTML) || 00;
            let currentM = parseInt(document.getElementById("minutes").innerHTML) || 00;
            let currentS = parseInt(document.getElementById("seconds").innerHTML) || 00;

            let h, m, s;

            // 2. Decide: Resume or Start Fresh?
            if (currentH === 0 && currentM === 0 && currentS === 0) {
                // If display is empty/zero, get from inputs
                h = parseInt(document.getElementById("inputhr").value) || 0;
                m = parseInt(document.getElementById("inputmin").value) || 0;
                s = parseInt(document.getElementById("inputsec").value) || 0;
            } else {
                // Otherwise, resume from what is visible
                h = currentH;
                m = currentM;
                s = currentS;
            }

            // Validation
            if (m > 59 || s > 59) {
                alert("Why is your minutes or seconds more than 59? You no go Primary School?");
                return;
            }

            // Set the initial display
            document.getElementById("hour").innerHTML = format(h);
            document.getElementById("minutes").innerHTML = format(m);
            document.getElementById("seconds").innerHTML = format(s);

            timer = setInterval(() => {
                // Re-read current numbers inside the interval
                let hr = parseInt(document.getElementById("hour").innerHTML) || 0;
                let min = parseInt(document.getElementById("minutes").innerHTML) || 0;
                let sec = parseInt(document.getElementById("seconds").innerHTML) || 0;

                if (hr === 0 && min === 0 && sec === 0) {
                    clearInterval(timer);
                    alarmSound.play();
                    alert("Time up!");
                    return;
                }

                // Subtraction Math
                sec--;
                if (sec < 0) {
                    sec = 59;
                    min--;
                    if (min < 0) {
                        min = 59;
                        hr--;
                    }
                }

                // Update display with formatting to prevent NaN on next loop
                document.getElementById("hour").innerHTML = format(hr);
                document.getElementById("minutes").innerHTML = format(min);
                document.getElementById("seconds").innerHTML = format(sec);
                
            }, 1000);
        }

        const pauseTime = () => {
            clearInterval(timer);

            let hr = document.getElementById("hour").innerHTML;
            let min = document.getElementById("minutes").innerHTML;
            let sec = document.getElementById("seconds").innerHTML;

            localStorage.setItem("savedHr", hr);
            localStorage.setItem("savedMin", min);
            localStorage.setItem("savedSec", sec);

            console.log("Timer saved!");
        };

        window.onload = () => {
            if (localStorage.getItem("savedHr")) {
                document.getElementById("hour").innerHTML = localStorage.getItem("savedHr");
                document.getElementById("minutes").innerHTML = localStorage.getItem("savedMin");
                document.getElementById("seconds").innerHTML = localStorage.getItem("savedSec");
            }
        };

        const resetTime=()=>{
            clearInterval(timer);
            seconds.innerHTML = 0
            minutes.innerHTML = 0
            hour.innerHTML = 0
            alarmsound.pause();
            localStorage.removeItem("savedHr");
            localStorage.removeItem("savedMin");
            localStorage.removeItem("savedSec");

            document.getElementById("hour").innerHTML = 0;
            document.getElementById("minutes").innerHTML = 0;
            document.getElementById("seconds").innerHTML = 0;

            console.log("Timer has been reset");
        }
    </script>
</body>
</html>
